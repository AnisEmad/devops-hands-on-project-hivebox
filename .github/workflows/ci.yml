name: CI
 
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
 
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
 
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
 
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pylint
 
      - name: Run pylint
        run: pylint main.py print_version.py test_main.py
 
      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
 
      - name: Run hadolint
        run: hadolint Dockerfile
 
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
 
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
 
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
 
      - name: Run tests
        run: pytest test_main.py -v
  build:
   name: Build Docker Image
   runs-on: ubuntu-latest
   needs: test
   steps:
     - name: Checkout code
       uses: actions/checkout@v6.0.2
 
     - name: Build Docker image
       run: docker build -t hivebox .
 
     - name: Start container
       run: docker run -d -p 8000:8000 --name hivebox hivebox
 
     - name: Wait for container to be ready
       run: sleep 3
 
     - name: Test /version endpoint
       run: |
         RESPONSE=$(curl -sf http://localhost:8000/version)
         echo "Response: $RESPONSE"
         if [ "$RESPONSE" != '"v0.0.1"' ]; then
           echo "Unexpected version: $RESPONSE"
           exit 1
         fi
 
     - name: Stop container
       if: always()
       run: docker stop hivebox && docker rm hivebox
