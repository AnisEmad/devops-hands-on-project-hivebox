name: CI
 
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - '**/README.md'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - '**/README.md'
 
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
 
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
 
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pylint
 
      - name: Run pylint
        run: pylint main.py print_version.py test_main.py test_integration.py
 
      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint
 
      - name: Run hadolint
        run: hadolint Dockerfile

  security-sast:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Run Semgrep SAST Rules
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-10
            p/dockerfile

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
 
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
 
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
 
      - name: Run tests
        run: pytest test_main.py -v

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run live-network contract integration tests
        run: pytest test_integration.py -v -m direct

  sonar-quality-gate:
    name: SonarQube Code Quality Gate
    runs-on: ubuntu-latest
    needs: [test, security-sast]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # Shallow clones must be disabled for deep Git blame history analysis

      - name: Execute SonarQube Scan Analyzer
        uses: sonarsource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Explicitly satisfies the project hint rule to check Quality Gate status
      - name: Enforce SonarQube Quality Gate Check
        uses: sonarsource/sonarcloud-quality-gate-action@v1.3.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
   name: Build Docker Image
   runs-on: ubuntu-latest
   needs: [integration-test, sonar-quality-gate]
   steps:
     - name: Checkout code
       uses: actions/checkout@v6.0.2
 
     - name: Build Docker image
       run: docker build -t hivebox .
 
     - name: Start container
       run: docker run -d -p 8000:8000 -e BASE_URL="https://fake-api.opensensemap.org" -e ids="box1" --name hivebox hivebox
 
     - name: Wait for container to be ready
       run: sleep 3
 
     - name: Test /version endpoint
       run: |
         RESPONSE=$(curl -sf http://localhost:8000/version)
         echo "Response: $RESPONSE"
         if [ "$RESPONSE" != '"v0.0.1"' ]; then
           echo "Unexpected version: $RESPONSE"
           exit 1
         fi
 
     - name: Stop container
       if: always()
       run: docker stop hivebox && docker rm hivebox
